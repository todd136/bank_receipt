name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: |
          call build_pyinstaller.bat

      - name: Verify artifact
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\bank_receipt.exe")) {
            Write-Host "dist\\bank_receipt.exe not found."
            Get-ChildItem -Path . -Recurse -Filter *.exe | Select-Object FullName
            throw "Build output dist\\bank_receipt.exe not found."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank_receipt-windows-exe-pyinstaller
          path: dist/bank_receipt.exe
          if-no-files-found: error
