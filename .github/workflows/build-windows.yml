name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-py312-${{ hashFiles('requirements.txt', 'build.bat') }}
          restore-keys: |
            nuitka-${{ runner.os }}-py312-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka[onefile]"

      - name: Build with Nuitka
        shell: cmd
        run: |
          call build.bat

      - name: Verify artifact
        shell: pwsh
        run: |
          if (-not (Test-Path ".\main.dist\bank_receipt.exe")) {
            Write-Host "main.dist\\bank_receipt.exe not found."
            Get-ChildItem -Path . -Recurse -Filter *.exe | Select-Object FullName
            throw "Build output main.dist\\bank_receipt.exe not found."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank_receipt-windows-dist
          path: main.dist/**
          if-no-files-found: error
